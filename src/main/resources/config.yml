# =====================================================
# ZenexChat - Основная конфигурация
# =====================================================

enabled: true

# =====================================================
# НАСТРОЙКИ ЧАТА
# =====================================================

chat:
  local-radius: 50
  global-symbol: "!"
  default-mode: LOCAL
  cooldown: 3
  anti-spam: true
  max-length: 256

# =====================================================
# НАСТРОЙКИ ЦВЕТОВ И ГРАДИЕНТОВ
# =====================================================

colors:
  hex-colors: true
  gradients: true
  rainbow: true

# =====================================================
# НАСТРОЙКИ ГОЛОГРАММ
# =====================================================

hologram:
  enabled: true
  height: 1.5
  duration: 5
  radius: 50
  config-file: "hologram.yml"

# =====================================================
# НАСТРОЙКИ ГОЛОСОВЫХ СООБЩЕНИЙ
# =====================================================

voice:
  format: "&7[&b🎤&7] {player} &6: &7{message}"
  sound-enabled: true
  sound: "ENTITY_PLAYER_LEVELUP"

# =====================================================
# НАСТРОЙКИ ИГР
# =====================================================

game:
  enabled: true
  default-game: "trivia"
